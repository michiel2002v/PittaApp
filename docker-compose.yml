services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pittaapp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pittaapp}
      POSTGRES_DB: ${POSTGRES_DB:-pittaapp}
    ports:
      - "5432:5432"
    volumes:
      - pittaapp_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pittaapp}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Postgres: Host=db;Port=5432;Database=${POSTGRES_DB:-pittaapp};Username=${POSTGRES_USER:-pittaapp};Password=${POSTGRES_PASSWORD:-pittaapp}
      Cors__AllowedOrigins__0: http://localhost:5173
    ports:
      - "5080:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:5080
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pittaapp_pgdata:
